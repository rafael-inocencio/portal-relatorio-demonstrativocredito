_schema-version: 3.3.0
ID: demonstrativo-credito
version: 1.0.0
description: "Demonstrativo de Crédito — SAP CAP + Fiori Elements BTP"

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:

  # ── CAP Backend (Node.js) ────────────────────────────────────────────────────
  - name: demonstrativo-credito-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      disk-quota: 512M
      memory: 256M
    properties:
      RFC_DESTINATION     : QA3_20            # Destination do Cloud Connector → ECC
      DEFAULT_COMPANY_CODE: "1000"
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: demonstrativo-credito-auth
      - name: demonstrativo-credito-destination
      - name: demonstrativo-credito-connectivity

  # ── HTML5 Deployer ───────────────────────────────────────────────────────────
  - name: demonstrativo-credito-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: demonstrativo-credito-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: demonstrativocreditocredito
          artifacts:
            - credito.zip
          target-path: app/

  # ── Fiori App (UI5) ──────────────────────────────────────────────────────────
  - name: demonstrativocreditocredito
    type: html5
    path: app/credito
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  # ── Destinations (criadas em deploy-time) ────────────────────────────────────
  - name: demonstrativo-credito-destinations
    type: com.sap.application.content
    requires:
      - name: demonstrativo-credito-auth
        parameters:
          service-key:
            name: demonstrativo-credito-auth-key
      - name: demonstrativo-credito-html5-repo-host
        parameters:
          service-key:
            name: demonstrativo-credito-html5-repo-host-key
      - name: srv-api
      - name: demonstrativo-credito-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: demonstrativo-credito-html5-repository
              ServiceInstanceName: demonstrativo-credito-html5-repo-host
              ServiceKeyName: demonstrativo-credito-html5-repo-host-key
              sap.cloud.service: demonstrativocredito.service
            - Name: demonstrativo-credito-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: demonstrativo-credito-auth
              ServiceKeyName: demonstrativo-credito-auth-key
              sap.cloud.service: demonstrativocredito.service
            - Name: srv-api
              URL: ~{srv-api/srv-url}
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: demonstrativo-credito-auth
              ServiceKeyName: demonstrativo-credito-auth-key
              sap.cloud.service: demonstrativocredito.service

resources:

  # ── XSUAA ────────────────────────────────────────────────────────────────────
  - name: demonstrativo-credito-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: demonstrativo-credito-${space}
        tenant-mode: dedicated

  # ── Destination Service ──────────────────────────────────────────────────────
  - name: demonstrativo-credito-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet

  # ── Cloud Connector (acesso OnPrem via SOAP/RFC) ─────────────────────────────
  - name: demonstrativo-credito-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  # ── HTML5 Repo Host (armazena apps Fiori) ────────────────────────────────────
  - name: demonstrativo-credito-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # ── HTML5 Repo Runtime (executa apps Fiori) ──────────────────────────────────
  - name: demonstrativo-credito-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
